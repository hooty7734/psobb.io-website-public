<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PSOBB Decryption Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Live findings from the autonomous PSOBB reverse engineering project.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Theme: Dark -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <style>
    /* Custom styling to match PSOBB.io website */
    :root {
      --theme-color: #00ffff; /* Neon Blue */
      --background-color: #0a0a10; /* PSOBB.io Dark */
      --base-color: #e0f0ff; /* Text */
      --sidebar-background: rgba(0, 10, 20, 0.95);
      --sidebar-border-color: #00ffff;
      --code-theme-background: #000000;
      --accent-color: #40c0ff; /* Secondary Cyan */
    }
    
    body {
      background-color: var(--background-color);
      background-image: linear-gradient(180deg, #0a0a10 0%, #000000 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
    }

    .sidebar {
      background-color: var(--sidebar-background);
      border-right: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }

    .sidebar h1 {
      color: var(--theme-color);
      text-shadow: 0 0 10px var(--theme-color);
      font-weight: bold;
      letter-spacing: 1px;
    }

    .sidebar ul li a {
      color: #d0d0e0;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .sidebar ul li a:hover {
      color: var(--theme-color);
      text-shadow: 0 0 8px var(--theme-color);
    }

    /* Improve Core Readability */
    .markdown-section p, 
    .markdown-section li {
      color: #e8e8f0;
      font-size: 1.05rem;
      line-height: 1.7;
      letter-spacing: 0.3px;
    }

    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color);
      background: rgba(0, 255, 255, 0.05);
      color: #c0d0e0;
      padding: 10px 20px;
    }

    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      color: var(--theme-color);
    }

    .markdown-section a {
      color: var(--theme-color);
    }
    
    .markdown-section a:hover {
      color: var(--accent-color);
      text-shadow: 0 0 5px var(--accent-color);
    }
    
    /* Premium Table Styling (PSOBB Style) */
    .markdown-section table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 1.5rem 0;
      background: rgba(0, 5, 10, 0.8);
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
    }

    .markdown-section th {
      background: rgba(0, 255, 255, 0.1);
      color: var(--theme-color);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 12px 15px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.4);
      text-align: left;
    }

    .markdown-section td {
      padding: 10px 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #cccccc;
      transition: background 0.2s ease;
      background: transparent !important;
    }

    .markdown-section tr {
      background-color: transparent !important;
      border-top: none !important;
    }

    .markdown-section tr:nth-child(2n) {
      background-color: rgba(0, 255, 255, 0.02) !important;
    }

    .markdown-section tr:last-child td {
      border-bottom: none;
    }

    .markdown-section tr:hover td {
      background: rgba(0, 255, 255, 0.05);
      color: #ffffff;
    }

    /* Code Block & Inline Code Styling */
    .markdown-section code {
      background: rgba(0, 20, 40, 0.6) !important;
      color: var(--theme-color) !important;
      padding: 2px 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.9em;
      border: 1px solid rgba(0, 255, 255, 0.2);
    }

    .markdown-section pre > code {
      color: #e0f0ff !important;
      border: none;
      padding: 0;
    }

    .markdown-section pre {
      background: #02050a !important;
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: inset 0 0 15px rgba(0,0,0,1);
    }

    /* Glassmorphism content area */
    section.cover.show {
      background: transparent;
    }

    /* Search Bar Enhancements */
    .sidebar .search input {
      background: rgba(0, 0, 0, 0.6) !important;
      border: 1px solid var(--theme-color) !important;
      color: #ffffff !important;
      border-radius: 6px;
      padding: 10px 15px;
      font-size: 1rem;
      transition: box-shadow 0.3s;
    }
    .sidebar .search input:focus {
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      outline: none;
    }
    .sidebar .search input::placeholder {
      color: rgba(0, 255, 255, 0.6) !important;
    }
    .sidebar .search .clear-button {
      color: var(--theme-color) !important;
    }
  </style>
</head>
<body>
  <div id="app">Loading PSOBB Decryption Database...</div>
  <script>
    window.$docsify = {
      name: 'PSOBB Decryption',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000, 
        paths: 'auto',
        placeholder: 'Search the database',
        noData: 'No Results!',
        depth: 6
      },
      requestHeaders: {
        'cache-control': 'no-cache'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Prism components for syntax highlighting -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
